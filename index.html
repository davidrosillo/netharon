<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Fractura de Netharon — Centro de Mando</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:        #09090b;
      --surface:   #111114;
      --surface2:  #18181c;
      --border:    #27272f;
      --border2:   #3a3a46;
      --gold:      #c9a84c;
      --gold-dim:  #7a5e20;
      --gold-glow: rgba(201,168,76,0.12);
      --text:      #e2ddd4;
      --text-dim:  #7a7570;
      --text-faint:#3d3d44;
      --green:     #2ecc71;
      --red:       #c0392b;
      --purple:    #9b59b6;
      --teal:      #1ab8a0;
      --blue:      #3498db;
      --ork:       #6abf6a;
      --radius:    4px;
    }

    /* ── RESET & BASE ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Text', Georgia, serif;
      font-size: 1rem;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.35;
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    #app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.25rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.2;
    }
    header p {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }
    #sync-status {
      font-size: 0.7rem;
      font-family: 'Courier New', monospace;
      padding: 5px 12px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      letter-spacing: 0.06em;
      white-space: nowrap;
      align-self: flex-start;
      margin-top: 4px;
      transition: all 0.3s;
    }
    #sync-status.saving { color: var(--gold); border-color: var(--gold-dim); }
    #sync-status.saved  { color: var(--green); border-color: rgba(46,204,113,0.4); }
    #sync-status.error  { color: var(--red);   border-color: rgba(192,57,43,0.4); }

    /* ── TABS ───────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .tab {
      padding: 9px 20px;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      color: var(--text-dim);
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      white-space: nowrap;
      transition: color 0.2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    /* ── CARDS ──────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.25rem;
      border-radius: var(--radius);
    }
    .card + .card { margin-top: 1rem; }

    /* ── STATS GRID ─────────────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1rem 1.125rem;
      border-radius: var(--radius);
    }
    .stat-value {
      font-size: 1.75rem;
      font-family: 'Courier New', monospace;
      color: var(--gold);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 5px;
      font-family: 'Courier New', monospace;
    }

    /* ── FACTION GRID ───────────────────────────────────── */
    .faction-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 1rem;
    }
    .faction-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.125rem;
      border-radius: var(--radius);
      transition: border-color 0.2s;
    }
    .faction-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.875rem;
    }
    .faction-icon {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }
    .faction-name { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 0.05em; }
    .faction-player { font-size: 0.7rem; color: var(--text-dim); font-family: 'Courier New', monospace; margin-top: 1px; }
    .faction-stats { display: flex; gap: 1.5rem; flex-wrap: wrap; margin-top: 6px; }
    .faction-stat-val { font-size: 1.25rem; font-family: 'Courier New', monospace; line-height: 1; }
    .faction-stat-lbl { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; font-family: 'Courier New', monospace; }

    /* ── ROUND TABS ─────────────────────────────────────── */
    .round-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 10px;
    }
    .round-title {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .round-tabs { display: flex; gap: 4px; }
    .round-tab {
      padding: 5px 14px;
      font-size: 0.7rem;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      border-radius: var(--radius);
      transition: all 0.15s;
    }
    .round-tab:hover { border-color: var(--border2); color: var(--text); }
    .round-tab.active { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: bold; }

    /* ── MATCH CARD ─────────────────────────────────────── */
    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.25rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
    }
    .match-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1rem;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-family: 'Courier New', monospace;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .badge {
      font-size: 0.6rem;
      padding: 2px 8px;
      border-radius: 2px;
      letter-spacing: 0.06em;
      font-family: 'Courier New', monospace;
    }
    .badge-gold { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
    .badge-special { background: rgba(155,89,182,0.12); color: var(--purple); border: 1px solid rgba(155,89,182,0.3); }

    .match-players {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: start;
      margin-bottom: 0;
    }
    .player-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.875rem;
      border-radius: var(--radius);
    }
    .player-name { font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.04em; }
    .player-role { font-size: 0.65rem; color: var(--text-dim); font-family: 'Courier New', monospace; margin-top: 2px; }
    .pv-pill {
      display: inline-block;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.35);
      padding: 2px 8px;
      border-radius: 2px;
      margin-top: 8px;
    }

    .vs-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 12px;
      gap: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      color: var(--text-faint);
    }

    /* select / form elements */
    .field-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 10px 0 4px;
    }
    select, input {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 6px 10px;
      font-size: 0.75rem;
      font-family: 'Courier New', monospace;
      border-radius: var(--radius);
      cursor: pointer;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    select:focus, input:focus { border-color: var(--gold-dim); }
    select option { background: var(--surface2); }

    /* objectives */
    .obj-section {
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      margin-top: 1rem;
    }
    .obj-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .obj-btn {
      padding: 5px 12px;
      font-size: 0.7rem;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      border-radius: var(--radius);
      transition: all 0.15s;
    }
    .obj-btn:hover:not(.achieved):not(:disabled) { border-color: var(--border2); color: var(--text); }
    .obj-btn.achieved { background: var(--gold); color: var(--bg); border-color: var(--gold); font-weight: bold; }
    .obj-btn.special-obj { border-color: rgba(155,89,182,0.4); color: var(--purple); }
    .obj-btn.special-obj.achieved { background: var(--purple); color: #fff; border-color: var(--purple); }
    .obj-btn:disabled { opacity: 0.5; cursor: default; }

    /* reward preview */
    .reward-preview {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 0.72rem;
      font-family: 'Courier New', monospace;
      line-height: 1.7;
      margin-top: 10px;
    }
    .rp-label-p { color: var(--gold); }
    .rp-label-s { color: var(--text-dim); }

    /* special note */
    .note-box {
      background: var(--gold-glow);
      border: 1px solid rgba(201,168,76,0.2);
      border-left: 3px solid var(--gold);
      padding: 8px 12px;
      font-size: 0.75rem;
      color: var(--gold);
      font-family: 'Courier New', monospace;
      border-radius: 0 var(--radius) var(--radius) 0;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    /* confirm button */
    .confirm-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 9px;
      font-size: 0.72rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--gold);
      background: none;
      color: var(--gold);
      border-radius: var(--radius);
      transition: all 0.2s;
    }
    .confirm-btn:hover { background: var(--gold); color: var(--bg); }
    .confirm-btn.danger { border-color: var(--red); color: var(--red); margin-top: 6px; }
    .confirm-btn.danger:hover { background: var(--red); color: #fff; }
    .confirmed-banner {
      text-align: center;
      padding: 7px;
      font-size: 0.7rem;
      font-family: 'Courier New', monospace;
      color: var(--green);
      border: 1px solid rgba(46,204,113,0.3);
      border-radius: var(--radius);
      margin-top: 1rem;
      letter-spacing: 0.1em;
    }

    /* ── REPUTATION ─────────────────────────────────────── */
    .rep-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .rep-name { font-size: 0.75rem; width: 150px; flex-shrink: 0; font-family: 'Crimson Text', serif; }
    .rep-bar {
      flex: 1;
      height: 5px;
      background: var(--border);
      position: relative;
      border-radius: 2px;
    }
    .rep-center {
      position: absolute;
      left: 50%; top: -3px;
      width: 1px; height: 11px;
      background: var(--border2);
    }
    .rep-fill {
      height: 100%;
      position: absolute;
      border-radius: 2px;
      transition: width 0.3s;
    }
    .rep-val {
      font-size: 0.7rem;
      font-family: 'Courier New', monospace;
      min-width: 28px;
      text-align: right;
    }
    .rep-btns { display: flex; gap: 3px; }
    .rep-btn {
      width: 22px; height: 22px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1;
      border-radius: 2px;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .rep-btn:hover { border-color: var(--border2); color: var(--text); }

    /* ── REWARDS ────────────────────────────────────────── */
    .rewards-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .reward-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1rem 1.125rem;
      border-radius: var(--radius);
    }
    .reward-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .reward-faction { font-family: 'Cinzel', serif; font-size: 0.8rem; letter-spacing: 0.04em; }
    .reward-meta { font-size: 0.65rem; color: var(--text-dim); font-family: 'Courier New', monospace; }
    .reward-directive { font-size: 0.7rem; color: var(--text-dim); font-family: 'Courier New', monospace; margin-bottom: 6px; }
    .reward-type {
      display: inline-block;
      padding: 2px 9px;
      font-size: 0.65rem;
      font-family: 'Courier New', monospace;
      border-radius: 2px;
      margin-bottom: 6px;
    }
    .rt-principal { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
    .rt-secundario { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
    .rt-especial { background: rgba(155,89,182,0.12); color: var(--purple); border: 1px solid rgba(155,89,182,0.3); }
    .reward-text { font-size: 0.85rem; color: var(--text); line-height: 1.5; }
    .remove-btn {
      margin-top: 8px;
      padding: 3px 10px;
      font-size: 0.65rem;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      border: 1px solid var(--border);
      background: none;
      color: var(--text-faint);
      border-radius: var(--radius);
      transition: all 0.15s;
    }
    .remove-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── UTILS ──────────────────────────────────────────── */
    .sep { height: 1px; background: var(--border); margin: 1.5rem 0; }
    .empty-state {
      text-align: center;
      padding: 2.5rem;
      color: var(--text-dim);
      font-size: 0.8rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.08em;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      line-height: 2;
    }
    .section-label {
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-family: 'Courier New', monospace;
      margin-bottom: 8px;
    }

    /* ── LOGIN SCREEN ───────────────────────────────────── */
    #login-screen {
      max-width: 420px;
      margin: 8rem auto 0;
      padding: 2.5rem 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-align: center;
    }
    #login-screen .login-sigil {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      display: block;
      opacity: 0.6;
    }
    #login-screen h2 {
      font-family: 'Cinzel', serif;
      color: var(--gold);
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    #login-screen p {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 2rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.04em;
    }
    #login-input {
      text-align: center;
      letter-spacing: 0.15em;
      font-size: 0.9rem;
    }
    #login-error {
      font-size: 0.7rem;
      color: var(--red);
      font-family: 'Courier New', monospace;
      margin-top: 8px;
      min-height: 1.2em;
      letter-spacing: 0.06em;
    }
    #login-btn {
      width: 100%;
      margin-top: 1.25rem;
      padding: 10px;
      font-size: 0.75rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--gold);
      background: none;
      color: var(--gold);
      border-radius: var(--radius);
      transition: all 0.2s;
    }
    #login-btn:hover { background: var(--gold); color: var(--bg); }
    #login-btn:active { transform: scale(0.98); }



    /* ── RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 600px) {
      #app { padding: 1rem 1rem 3rem; }
      header h1 { font-size: 1rem; }
      .match-players { grid-template-columns: 1fr; }
      .vs-col { flex-direction: row; padding: 0; justify-content: center; }
      .faction-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .rep-name { width: 110px; font-size: 0.7rem; }
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <span class="login-sigil">⬡</span>
  <h2>La Fractura de Netharon</h2>
  <p>Centro de Mando — Acceso restringido</p>
  <input type="password" id="login-input" placeholder="· · · · · · · · · · · ·"
    onkeydown="if(event.key==='Enter') doLogin()">
  <div id="login-error"></div>
  <button id="login-btn" onclick="doLogin()">Acceder →</button>
</div>



<!-- MAIN APP -->
<div id="app" style="display:none">
  <header>
    <div>
      <h1>⬡ La Fractura de Netharon — Centro de Mando</h1>
      <p>Campaña narrativa · Ronda activa: <span id="active-round-display">1</span> / 4</p>
    </div>
    <div id="sync-status" class="sync-indicator">inicializando...</div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('resumen',this)">Resumen</button>
    <button class="tab" onclick="switchTab('rondas',this)">Rondas</button>
    <button class="tab" onclick="switchTab('reputacion',this)">Reputación</button>
    <button class="tab" onclick="switchTab('recompensas',this)">Recompensas</button>
    <button class="tab" onclick="switchTab('ranking',this)">Ranking</button>
  </div>

  <div class="panel active" id="panel-resumen"></div>
  <div class="panel" id="panel-rondas"></div>
  <div class="panel" id="panel-reputacion"></div>
  <div class="panel" id="panel-recompensas"></div>
  <div class="panel" id="panel-ranking"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════
const FACTIONS = {
  PI:  { name:"Puños Imperiales",          player:"Capitán Ernest Sedirae",        icon:"⚒", color:"#c9a84c",
         advisors:["Capellán Mordren","Tecnomarine Torvak","Teniente Androm"] },
  OR:  { name:"Brooooomka Morka",           player:"Grashnak / Dregfang Hidegore",  icon:"💀", color:"#6abf6a",
         advisors:["Urgbak Rompekráneoz","Mekboy Buzzgob","Gizwort"] },

async function saveState() {
  setSyncStatus('saving', '↑ guardando...');
  clearTimeout(saveTimer);

    try {
      const { error } = await sbClient.from('campaign').upsert({ key: STORAGE_KEY, value: JSON.stringify(state) });
      if (error) throw error;
      setSyncStatus('saved', '● guardado');
    } catch(e) {
      setSyncStatus('error', '● error al guardar');
      console.error(e);
    }
  }, 700);
}

async function loadState() {
  setSyncStatus('saving', 'cargando...');
  try {
    const { data, error } = await sbClient.from('campaign').select('value').eq('key', STORAGE_KEY).single();
    if (data && data.value) {
      const loaded = JSON.parse(data.value);
      state = { ...state, ...loaded };
    }
    setSyncStatus('saved', '● sincronizado');
  } catch(e) {
    setSyncStatus('error', '● sin datos — empezando de cero');
  }
  renderAll();
}

function calcPV(fKey) {
  let t = 0;
  Object.values(state.matches).forEach(m => { if (m['pv_'+fKey]) t += m['pv_'+fKey]; });
  return t;
}

function renderResumen() {
  const confirmed = Object.values(state.matches).filter(m => m.confirmed).length;
  const totalPV = Object.keys(FACTIONS).reduce((s,f) => s + calcPV(f), 0);
  document.getElementById('panel-resumen').innerHTML = `

      <div class="stat-card"><div class="stat-value">${state.rewards.length}</div><div class="stat-label">Recompensas</div></div>
      <div class="stat-card"><div class="stat-value">${totalPV}</div><div class="stat-label">PV totales</div></div>
    </div>

  const content = matches.length
    ? matches.map(m => renderMatchCard(m)).join('')
    : `<div class="empty-state">Ronda ${r} — emparejamientos pendientes de configurar.</div>`;
  document.getElementById('panel-rondas').innerHTML = `
    <div class="round-header">
      <div class="round-title">Registro de partidas</div>
      <div class="round-tabs">${roundTabs}</div>
    </div>${content}`;
}

function renderMatchCard(match) {
  const ms = getMS(match.id);
  const confirmed = !!ms.confirmed;
  const f1k = match.f1;
  const f1 = match.f1info;
  const f2 = match.f2 ? match.f2info : null;
  const f2k = match.f2;

  const playerBlock = (fk, finfo) => {
    const dirs = match.dirs[fk]||[];
    const dirIdx = ms['dir_'+fk];
    const pv = ms['pv_'+fk]||0;
    const opts = dirs.map((d,i) =>
      `<option value="${i}" ${dirIdx==i?'selected':''}>${d.label}</option>`
    ).join('');
    return `<div class="player-block">
      <div class="player-name" style="color:${finfo.color}">${finfo.icon} ${finfo.name}</div>
      <div class="player-role">${finfo.player}</div>
      ${dirs.length ? `<div class="field-label">Directiva elegida</div>
      <select ${confirmed?'disabled':''} onchange="setDir('${match.id}','${fk}',this.value)">
        <option value="">— pendiente —</option>${opts}
      </select>` : `<div style="font-size:0.7rem;color:var(--text-dim);font-family:'Courier New',monospace;margin-top:8px;">Director de Campaña</div>`}
      <div class="pv-pill">${pv} PV</div>
    </div>`;
  };

  const comodinBlock = `<div class="player-block">
    <div class="player-name" style="color:var(--text-dim)">⬡ ${match.comodin||'Comodín'}</div>
    <div class="player-role">Director de Campaña</div>
  </div>`;

  const objSection = (fk) => {
    const objs = match.objs[fk]||[];
    const dirIdx = ms['dir_'+fk];
    const dir = dirIdx!=null && dirIdx!=='' ? (match.dirs[fk]||[])[parseInt(dirIdx)] : null;
    const ach = ms['ach_'+fk]||[];
    const qtys = ms['qty_'+fk]||{};
    const finfo = fk==='OR2' ? match.f1info : (FACTIONS[fk]||match.f1info);
    const items = objs.map(o => {
      const isAch = ach.includes(o.k);
      let hint = '';
      if (dir) { if(dir.prin===o.k) hint=' [P]'; else if(dir.sec===o.k) hint=' [S]'; }
      const btn = `<button class="obj-btn ${isAch?'achieved':''} ${o.special?'special-obj':''}" ${confirmed?'disabled':''} onclick="toggleObj('${match.id}','${fk}','${o.k}')">${o.k} — ${o.t}${hint}</button>`;
      if (o.qty) {
        const qval = qtys[o.k]||0;
        // qty counter always visible — reward is independent of whether objective counts for PV
        const qinput = `<div style="display:inline-flex;align-items:center;gap:6px;vertical-align:middle;margin-left:4px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:2px 6px;">
          <button style="width:18px;height:18px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--text-dim);line-height:1;" ${confirmed?'disabled':''} onclick="adjQty('${match.id}','${fk}','${o.k}',-1,${o.qty.max})">−</button>
          <span style="font-family:'Courier New',monospace;font-size:0.8rem;color:var(--gold);min-width:14px;text-align:center;">${qval}</span>
          <span style="font-size:0.6rem;color:var(--text-faint);font-family:'Courier New',monospace;">/${o.qty.max} ${o.qty.unit}</span>
          <button style="width:18px;height:18px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--text-dim);line-height:1;" ${confirmed?'disabled':''} onclick="adjQty('${match.id}','${fk}','${o.k}',1,${o.qty.max})">+</button>
        </div>`;
        return `<div style="display:inline-flex;align-items:center;flex-wrap:wrap;gap:0;">${btn}${qinput}</div>`;
      }
      return btn;
    }).join('');
    const preview = dir ? rewardPreview(match, fk, dir, ach, qtys) : '';
    return `<div class="obj-section">
      <div class="section-label">${finfo.name} — objetivos conseguidos</div>
      <div class="obj-grid">${items}</div>${preview}
    </div>`;
  };

  const statusColor = confirmed ? '#2ecc71' : (ms['dir_'+f1k]!=null ? '#c9a84c' : '#3d3d44');

  return `<div class="match-card">
    <div class="match-title">
      <span class="status-dot" style="background:${statusColor}"></span>
      ${match.label}
      ${match.special ? '<span class="badge badge-gold">SEGUNDA ROKA</span>' : ''}
    </div>
    ${match.special ? `<div class="note-box">${match.special}</div>` : ''}
    <div class="match-players">
      ${playerBlock(f1k, f1)}
      <div class="vs-col">
        <span>VS</span>
        <span style="font-size:0.6rem;margin-top:4px;">${ms['pv_'+f1k]||0} / ${f2k?ms['pv_'+f2k]||0:'—'}</span>
      </div>
      ${f2 ? playerBlock(f2k, f2) : comodinBlock}
    </div>
    ${objSection(f1k)}
    ${f2k ? objSection(f2k) : ''}
    ${confirmed
      ? `<div class="confirmed-banner">✓ Resultados confirmados</div>
         <button class="confirm-btn danger" onclick="unconfirm('${match.id}')">Desbloquear para editar</button>`
      : `<button class="confirm-btn" onclick="confirm_('${match.id}')">Confirmar y aplicar resultados →</button>`
    }
  </div>`;
}

function rewardPreview(match, fk, dir, ach, qtys) {
  qtys = qtys||{};
  const rmap = match.rewards[fk]||{};
  const objs = match.objs[fk]||[];
  const lines = [];

  // PV objectives in directiva (principal / secundario)
  [dir.prin, dir.sec].forEach((objKey, idx) => {
    if (!ach.includes(objKey)) return;
    const rw = rmap[`${dir.adv}-${objKey}`] || rmap[objKey];
    if (!rw) return;
    const label = idx===0
      ? `<span class="rp-label-p">▲ Principal (${objKey}):</span>`
      : `<span class="rp-label-s">▼ Secundario (${objKey}):</span>`;
    const objDef = objs.find(o=>o.k===objKey);
    let suffix = '';
    if (objDef && objDef.qty) {
      const q = qtys[objKey]||0;
      const m2 = rw.match(/(\d+)\s*pts?\s+por/i);
      if (m2 && q > 0) {
        suffix = ` <span style="color:var(--gold);font-weight:bold;">→ ${parseInt(m2[1])*q} pts (${q} ${objDef.qty.unit})</span>`;
      } else if (q === 0) {
        suffix = ` <span style="color:var(--text-faint)">(introduce la cantidad)</span>`;
      }
    }
    lines.push(`${label} ${rw}${suffix}`);
  });

  // qty objectives outside directiva: reward is always granted regardless of PV
  objs.filter(o => o.qty && o.k !== dir.prin && o.k !== dir.sec).forEach(o => {
    const q = qtys[o.k]||0;
    const rw = rmap[`${dir.adv}-${o.k}`] || rmap[o.k];
    if (!rw) return;
    const m2 = rw.match(/(\d+)\s*pts?\s+por/i);
    const qLabel = `<span style="color:var(--text-dim)">◆ ${o.k} (recompensa independiente):</span>`;
    const suffix = q > 0 && m2
      ? ` <span style="color:var(--gold);font-weight:bold;">→ ${parseInt(m2[1])*q} pts (${q} ${o.qty.unit})</span>`
      : ` <span style="color:var(--text-faint)">(introduce la cantidad)</span>`;
    lines.push(`${qLabel} ${rw}${suffix}`);
  });

  if (!lines.length) return '';
  return `<div class="reward-preview">${lines.join('<br>')}</div>`;
}

// ACTIONS — RONDAS
// ═══════════════════════════════════════════════════════════
function setDir(matchId, fk, value) {
  const ms = getMS(matchId);
  ms['dir_'+fk] = value==='' ? null : parseInt(value);
  saveState();
  renderRondas(state.activeRound);
}

function toggleObj(matchId, fk, key) {
  const ms = getMS(matchId);
  if (ms.confirmed) return;
  const arr = ms['ach_'+fk]||[];
  const i = arr.indexOf(key);
  if (i>=0) arr.splice(i,1); else arr.push(key);
  ms['ach_'+fk] = arr;
  saveState();
  renderRondas(state.activeRound);
}

function adjQty(matchId, fk, key, delta, max) {
  const ms = getMS(matchId);
  if (ms.confirmed) return;
  if (!ms['qty_'+fk]) ms['qty_'+fk] = {};
  const cur = ms['qty_'+fk][key]||0;
  ms['qty_'+fk][key] = Math.max(0, Math.min(max, cur + delta));
  saveState();
  renderRondas(state.activeRound);
}

function confirm_(matchId) {
  const match = MATCHES.find(m=>m.id===matchId);
  const ms = getMS(matchId);
  const fks = [match.f1, match.f2].filter(Boolean);

  fks.forEach(fk => {
    const dirIdx = ms['dir_'+fk];
    if (dirIdx==null || dirIdx==='') return;
    const dir = (match.dirs[fk]||[])[parseInt(dirIdx)];
    if (!dir) return;
    const ach = ms['ach_'+fk]||[];
    let pv = 0;
    if (ach.includes(dir.prin)) pv+=3;
    if (ach.includes(dir.sec)) pv+=1;
    ms['pv_'+fk] = pv;

    const baseFk = fk==='OR2' ? 'OR' : fk;
    const rep = state.reputation[baseFk];
    if (rep) { rep[dir.adv]+=1; rep[dir.opp]-=1; }

    const pushReward = (type, obj) => {
      const qtys = ms['qty_'+fk]||{};
      const objDef = (match.objs[fk]||[]).find(o=>o.k===obj);
      const qty = (objDef && objDef.qty) ? (qtys[obj]||0) : null;
      state.rewards.push({
        id: `${Date.now()}_${fk}_${type}`, faction: baseFk,
        match: matchId, round: match.round, type, directive: dir.label, dirAdv: dir.adv, obj, qty
      });
    };

    if (ach.includes(dir.prin)) pushReward('principal', dir.prin);
    if (ach.includes(dir.sec))  pushReward('secundario', dir.sec);

    // special objectives (like Gizwort)
    (match.objs[fk]||[]).filter(o=>o.special && ach.includes(o.k) && o.k!==dir.prin && o.k!==dir.sec)
      .forEach(o => pushReward('especial', o.k));

    // qty-based rewards: register for any graduated objective with qty > 0,
    // even if the objective itself doesn't count for PV (not in directiva or not achieved)
    (match.objs[fk]||[]).filter(o => o.qty).forEach(o => {
      const qty = (ms['qty_'+fk]||{})[o.k]||0;
      if (qty === 0) return;
      // avoid duplicate if already registered above as principal/secundario
      const alreadyPushed = (o.k===dir.prin && ach.includes(dir.prin)) || (o.k===dir.sec && ach.includes(dir.sec));
      if (alreadyPushed) return;
      pushReward('cantidad', o.k);
    });
  });

  ms.confirmed = true;
  saveState();
  renderRondas(state.activeRound);
  renderResumen();
}

function unconfirm(matchId) {
  const match = MATCHES.find(m=>m.id===matchId);
  const ms = getMS(matchId);
  state.rewards = state.rewards.filter(r=>r.match!==matchId);
  const fks = [match.f1, match.f2].filter(Boolean);
  fks.forEach(fk => {
    const dirIdx = ms['dir_'+fk];
    if (dirIdx==null) return;
    const dir = (match.dirs[fk]||[])[parseInt(dirIdx)];
    if (!dir) return;
    const baseFk = fk==='OR2' ? 'OR' : fk;
    const rep = state.reputation[baseFk];
    if (rep) { rep[dir.adv]-=1; rep[dir.opp]+=1; }
    ms['pv_'+fk] = 0;
  });
  ms.confirmed = false;
  saveState();
  renderRondas(state.activeRound);
  renderResumen();
}

// ═══════════════════════════════════════════════════════════
// RENDER — REPUTACIÓN
// ═══════════════════════════════════════════════════════════
function renderReputacion() {
  document.getElementById('panel-reputacion').innerHTML = `<div class="faction-grid">
    ${Object.entries(FACTIONS).map(([k,f]) => {
      const rep = state.reputation[k]||[0,0,0];
      const rows = f.advisors.map((adv,i) => {
        const v = rep[i];
        const pct = Math.min(Math.abs(v)/5*50, 50);
        const color = v>0 ? '#2ecc71' : v<0 ? '#c0392b' : 'var(--text-faint)';
        return `<div class="rep-row">
          <div class="rep-name">${adv}</div>
          <div class="rep-bar">
            <div class="rep-center"></div>
            <div class="rep-fill" style="width:${pct}%;background:${color};${v<0?'right:50%':'left:50%'};"></div>
          </div>
          <div class="rep-val" style="color:${color}">${v>0?'+':''}${v}</div>
          <div class="rep-btns">
            <button class="rep-btn" onclick="adjRep('${k}',${i},-1)">−</button>
            <button class="rep-btn" style="color:${f.color}" onclick="adjRep('${k}',${i},1)">+</button>
          </div>
        </div>`;
      }).join('');
      return `<div class="faction-card">
        <div class="faction-header">
          <div class="faction-icon" style="color:${f.color};border-color:${f.color}25">${f.icon}</div>
          <div><div class="faction-name" style="color:${f.color}">${f.name}</div><div class="faction-player">${f.player}</div></div>
        </div>
        <div style="margin-top:10px;"><div class="section-label">Reputación con consejeros</div>${rows}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function adjRep(k,i,d) {
  state.reputation[k][i]+=d;
  saveState();
  renderReputacion();
}

// ═══════════════════════════════════════════════════════════
// RENDER — RECOMPENSAS
// ═══════════════════════════════════════════════════════════
function renderRecompensas() {
  const el = document.getElementById('panel-recompensas');
  if (!state.rewards.length) {
    el.innerHTML = '<div class="empty-state">Ninguna recompensa registrada aún.<br>Confirma los resultados de una partida para generarlas.</div>';
    return;
  }
  const grouped = {};
  state.rewards.forEach(r => { (grouped[r.faction]||(grouped[r.faction]=[])).push(r); });
  el.innerHTML = `<div class="rewards-list">
    ${Object.entries(grouped).map(([fk,rewards]) => {
      const f = FACTIONS[fk]||{name:fk,color:'#c9a84c',icon:'?'};
      return rewards.map(r => {
        const match = MATCHES.find(m=>m.id===r.match);
        const fkInMatch = (fk==='OR' && r.match==='R1M4') ? 'OR2' : fk;
        const rmap = match?.rewards[fkInMatch]||{};
        const rtext = rmap[`${r.dirAdv}-${r.obj}`] || rmap[r.obj] || 'Consultar documento de briefing.';
        const typeClass = {principal:'rt-principal',secundario:'rt-secundario',especial:'rt-especial',cantidad:'rt-secundario'}[r.type]||'rt-secundario';
        const typeLabel = {principal:'▲ Principal',secundario:'▼ Secundario',especial:'★ Especial',cantidad:'◆ Cantidad'}[r.type]||r.type;
        return `<div class="reward-card">
          <div class="reward-header">
            <div class="reward-faction" style="color:${f.color}">${f.icon} ${f.name}</div>
            <div class="reward-meta">Ronda ${r.round} · ${match?.label||''}</div>
          </div>
          <div class="reward-directive">${r.directive}</div>
          <span class="reward-type ${typeClass}">${typeLabel} — Obj. ${r.obj}</span>
          <div class="reward-text">${rtext}${(() => {
            if (r.qty == null) return '';
            const m2 = rtext.match(/(\d+)\s*pts?\s+por/i);
            if (m2) {
              const total = parseInt(m2[1]) * r.qty;
              return `<span style="display:block;margin-top:4px;font-family:'Courier New',monospace;color:var(--gold);font-size:0.9rem;">→ ${total} pts <span style="color:var(--text-dim);font-size:0.75rem;">(${r.qty} unidades)</span></span>`;
            }
            return '';
          })()}</div>
          <button class="remove-btn" onclick="removeReward('${r.id}')">Eliminar</button>
        </div>`;
      }).join('');
    }).join('')}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// RENDER — RANKING
// ═══════════════════════════════════════════════════════════
function renderRanking() {
  const ranked = Object.entries(FACTIONS).map(([k, f]) => {
    const pv = calcPV(k);
    const rep = state.reputation[k] || [0,0,0];
    const repNet = rep.reduce((a,b)=>a+b,0);
    const rew = state.rewards.filter(r=>r.faction===k).length;
    const confirmed = Object.entries(state.matches)
      .filter(([,m]) => m.confirmed && (m['pv_'+k] !== undefined))
      .length;
    return { k, f, pv, repNet, rew, confirmed };
  }).sort((a,b) => b.pv - a.pv || a.f.name.localeCompare(b.f.name, 'es'));

  const maxPV = Math.max(...ranked.map(r=>r.pv), 1);

  const rows = ranked.map((r, i) => {
    const medal = ['🥇','🥈','🥉'][i] || '';
    const barW = Math.round((r.pv / maxPV) * 100);
    const isFirst = i === 0 && r.pv > 0;
    return `<div style="background:var(--surface);border:1px solid ${isFirst ? r.f.color+'60' : 'var(--border)'};border-radius:var(--radius);padding:1.25rem;margin-bottom:0.75rem;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:0.875rem;">
        <div style="font-family:'Courier New',monospace;font-size:1.4rem;color:var(--text-faint);width:32px;text-align:center;flex-shrink:0;">${i+1}</div>
        <div style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid ${r.f.color}30;border-radius:var(--radius);flex-shrink:0;color:${r.f.color}">${r.f.icon}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:'Cinzel',serif;font-size:0.85rem;color:${r.f.color};letter-spacing:0.04em">${r.f.name}</div>
          <div style="font-size:0.65rem;color:var(--text-dim);font-family:'Courier New',monospace;margin-top:1px">${r.f.player}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:1.75rem;font-family:'Courier New',monospace;color:${r.f.color};line-height:1">${r.pv}</div>
          <div style="font-size:0.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;font-family:'Courier New',monospace">PV</div>
        </div>
      </div>
      <div style="height:4px;background:var(--border);border-radius:2px;margin-bottom:0.75rem;">
        <div style="height:100%;width:${barW}%;background:${r.f.color};border-radius:2px;transition:width 0.5s ease;"></div>
      </div>
      <div style="display:flex;gap:1.5rem;flex-wrap:wrap;">
        <div>
          <div style="font-size:0.85rem;font-family:'Courier New',monospace;color:${r.repNet>=0?'#2ecc71':'#c0392b'}">${r.repNet>=0?'+':''}${r.repNet}</div>
          <div style="font-size:0.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;font-family:'Courier New',monospace">Rep. neta</div>
        </div>
        <div>
          <div style="font-size:0.85rem;font-family:'Courier New',monospace;color:var(--text-dim)">${r.rew}</div>
          <div style="font-size:0.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;font-family:'Courier New',monospace">Recompensas</div>
        </div>
        <div>
          <div style="font-size:0.85rem;font-family:'Courier New',monospace;color:var(--text-dim)">${r.confirmed}</div>
          <div style="font-size:0.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;font-family:'Courier New',monospace">Partidas</div>
        </div>
      </div>
    </div>`;
  }).join('');

  const noPV = ranked.every(r => r.pv === 0);
  document.getElementById('panel-ranking').innerHTML = noPV
    ? '<div class="empty-state">Sin datos aún.<br>Confirma los resultados de al menos una partida para ver el ranking.</div>'
    : `<div style="margin-bottom:1.25rem;">
        <div style="font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.25rem;">Clasificación general</div>
        <div style="font-size:0.7rem;color:var(--text-dim);font-family:'Courier New',monospace;">Ordenado por PV acumulados · empates resueltos alfabéticamente</div>
      </div>${rows}`;
}

function removeReward(id) {
  state.rewards = state.rewards.filter(r=>r.id!==id);
  saveState();
  renderRecompensas();
}

// ═══════════════════════════════════════════════════════════
const PASS_HASH = '61e0fcf0d19c793f74dd4eb2010e0b3cdbcabd5bdce2b7c776f4931133198f05';
const PASS_SALT = 'netharon2024xk9';
const SESSION_KEY = 'netharon_auth';

function simpleHash(str) {
  // djb2 hash — works without crypto.subtle, sufficient for basic access control
  let h = 5381;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) + h) ^ str.charCodeAt(i);
    h = h >>> 0;
  }
  return h.toString(16);
}

const PASS_CHECK = simpleHash(PASS_SALT + 'Nth-7x2K-m4Rq');

async function doLogin() {
  const val = document.getElementById('login-input').value;
  const err = document.getElementById('login-error');
  if (simpleHash(PASS_SALT + val) === PASS_CHECK) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    err.textContent = '';
    loadState();
  } else {
    document.getElementById('login-input').value = '';
    err.textContent = 'Contraseña incorrecta.';
    document.getElementById('login-input').focus();
  }
}

function isAuthed() {
  return sessionStorage.getItem(SESSION_KEY) === '1';
}

// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════
(function init() {
  if (isAuthed()) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadState();
  } else {
    setTimeout(() => document.getElementById('login-input').focus(), 100);
  }
})();
